<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4A3728">
    <title>CoffeeWay Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FAF7F0;
            --warm-brown: #8B6F47;
            --deep-brown: #4A3728;
            --terra: #C17C5A;
            --sage: #9CAF88;
            --coffee: #3E2723;
            --bg: #F5EDE0;
            --card: #FFFFFF;
            --nav-h: 64px;
            --header-h: 130px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--coffee);
            overflow-x: hidden;
            padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
        }

        /* ── LOADING ── */
        #loading {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--cream);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 1rem;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(193,124,90,0.2);
            border-top-color: var(--terra);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-family: 'Playfair Display', serif; color: var(--warm-brown); font-size: 1rem; }

        /* ── HEADER ── */
        .app-header {
            position: sticky; top: 0; z-index: 200;
            background: var(--deep-brown);
            padding: 0 1rem;
            height: var(--header-h);
            display: flex; flex-direction: column;
            justify-content: flex-end; padding-bottom: 0;
        }
        .header-top {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 1rem 0 0.5rem;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem; font-weight: 900;
            color: #fff; letter-spacing: 1px;
        }
        .logo span { color: var(--terra); }
        .item-total-badge {
            background: var(--terra);
            color: #fff; font-size: 0.72rem;
            padding: 0.25rem 0.7rem;
            border-radius: 20px; font-weight: 600;
        }

        /* Category scroll tabs in header */
        .cat-tabs {
            display: flex; gap: 0.4rem;
            overflow-x: auto; scrollbar-width: none;
            padding-bottom: 0.75rem;
            padding-top: 0.3rem;
        }
        .cat-tabs::-webkit-scrollbar { display: none; }
        .cat-tab {
            display: flex; align-items: center; gap: 0.35rem;
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.75);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 0.4rem 0.9rem;
            font-size: 0.8rem; font-weight: 500;
            white-space: nowrap; cursor: pointer;
            transition: all 0.2s; flex-shrink: 0;
        }
        .cat-tab.active {
            background: var(--terra);
            color: #fff; border-color: var(--terra);
        }
        .cat-tab-emoji { font-size: 0.95rem; }

        /* ── SEARCH BAR ── */
        .search-wrap {
            padding: 0.75rem 1rem;
            background: var(--bg);
            position: sticky;
            top: var(--header-h);
            z-index: 150;
        }
        .search-input {
            width: 100%; padding: 0.65rem 1rem 0.65rem 2.6rem;
            background: #fff; border: 1.5px solid rgba(139,111,71,0.15);
            border-radius: 30px; font-family: 'Inter', sans-serif;
            font-size: 0.9rem; color: var(--coffee);
            outline: none; transition: border 0.2s;
        }
        .search-input:focus { border-color: var(--terra); }
        .search-icon {
            position: absolute; left: 1.9rem;
            top: 50%; transform: translateY(-50%);
            color: var(--warm-brown); font-size: 0.95rem;
            pointer-events: none;
        }
        .search-wrap { position: relative; }

        /* ── MAIN CONTENT ── */
        .main { padding: 0 0 1rem; }

        /* ── CATEGORY SECTION ── */
        .cat-section { margin-bottom: 0.5rem; }

        .cat-section-header {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 1rem 1rem 0.6rem;
            position: sticky;
            top: calc(var(--header-h) + 58px);
            z-index: 100;
            background: var(--bg);
        }
        .cat-section-title {
            display: flex; align-items: center; gap: 0.5rem;
        }
        .cat-section-emoji { font-size: 1.3rem; }
        .cat-section-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem; font-weight: 700;
            color: var(--deep-brown);
        }
        .cat-badge {
            background: rgba(193,124,90,0.15);
            color: var(--terra); font-size: 0.72rem;
            padding: 0.2rem 0.55rem; border-radius: 10px;
            font-weight: 600;
        }

        /* ── SUB-CATEGORY PILLS ── */
        .sub-pills {
            display: flex; gap: 0.4rem;
            overflow-x: auto; scrollbar-width: none;
            padding: 0 1rem 0.75rem;
        }
        .sub-pills::-webkit-scrollbar { display: none; }
        .sub-pill {
            background: #fff;
            color: var(--warm-brown);
            border: 1px solid rgba(139,111,71,0.2);
            border-radius: 20px; padding: 0.35rem 0.85rem;
            font-size: 0.78rem; font-weight: 500;
            white-space: nowrap; cursor: pointer;
            transition: all 0.2s; flex-shrink: 0;
        }
        .sub-pill.active {
            background: var(--deep-brown);
            color: #fff; border-color: var(--deep-brown);
        }

        /* ── ITEM CARDS ── */
        .items-list { padding: 0 1rem; display: flex; flex-direction: column; gap: 0.55rem; }

        .menu-item {
            background: var(--card);
            border-radius: 14px;
            padding: 0.9rem 1rem;
            display: flex; align-items: center;
            justify-content: space-between; gap: 0.8rem;
            box-shadow: 0 1px 6px rgba(62,39,35,0.07);
            border: 1px solid rgba(193,124,90,0.08);
            transition: transform 0.15s, box-shadow 0.15s;
            cursor: default;
        }
        .menu-item:active { transform: scale(0.98); box-shadow: 0 1px 3px rgba(62,39,35,0.05); }
        .menu-item.unavailable { opacity: 0.4; }

        .item-info { flex: 1; min-width: 0; }
        .item-name {
            font-size: 0.95rem; font-weight: 600;
            color: var(--deep-brown);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-desc {
            font-size: 0.78rem; color: var(--warm-brown);
            margin-top: 0.2rem; line-height: 1.35;
        }
        .item-price-tag {
            background: var(--terra);
            color: #fff; font-size: 0.82rem; font-weight: 600;
            padding: 0.3rem 0.7rem; border-radius: 20px;
            white-space: nowrap; flex-shrink: 0;
        }

        /* Show more button */
        .show-more-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            margin: 0.75rem 1rem 0.25rem;
            background: #fff; border: 1.5px dashed rgba(193,124,90,0.35);
            color: var(--terra); border-radius: 12px;
            padding: 0.7rem; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .show-more-btn:active { background: rgba(193,124,90,0.08); }
        .show-more-icon { font-size: 0.75rem; transition: transform 0.3s; }
        .show-more-btn.open .show-more-icon { transform: rotate(180deg); }

        /* section divider */
        .section-divider {
            height: 1px;
            background: rgba(139,111,71,0.12);
            margin: 0.5rem 1rem;
        }

        /* ── NO RESULTS ── */
        .no-results {
            text-align: center; padding: 3rem 1rem;
            color: var(--warm-brown); font-style: italic;
        }
        .no-results-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        /* ── ERROR ── */
        #error-msg {
            display: none;
            margin: 2rem 1rem;
            background: #fff3f0; border: 1px solid #f5c6bc;
            border-radius: 14px; padding: 1.5rem; text-align: center;
            color: #c0392b;
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + env(safe-area-inset-bottom));
            background: var(--deep-brown);
            display: flex; align-items: flex-start; justify-content: space-around;
            padding-top: 0.5rem;
            z-index: 300;
            box-shadow: 0 -2px 16px rgba(62,39,35,0.25);
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.2rem; padding: 0.3rem 0.8rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer; transition: color 0.2s;
            border: none; background: none;
            font-family: 'Inter', sans-serif;
        }
        .nav-btn.active { color: var(--terra); }
        .nav-btn-icon { font-size: 1.3rem; }
        .nav-btn-label { font-size: 0.65rem; font-weight: 500; }

        /* ── SEARCH PAGE ── */
        #search-page {
            display: none;
            position: fixed; inset: 0;
            background: var(--bg);
            z-index: 250;
            overflow-y: auto;
            padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
        }
        #search-page.show { display: block; }
        .search-page-header {
            background: var(--deep-brown);
            padding: 1rem 1rem 0.8rem;
            display: flex; align-items: center; gap: 0.75rem;
            position: sticky; top: 0; z-index: 10;
        }
        .search-page-input {
            flex: 1; padding: 0.65rem 1rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px; color: #fff;
            font-size: 0.95rem; font-family: 'Inter', sans-serif;
            outline: none;
        }
        .search-page-input::placeholder { color: rgba(255,255,255,0.5); }
        .search-cancel {
            color: var(--terra); font-size: 0.88rem;
            font-weight: 600; cursor: pointer; white-space: nowrap;
            background: none; border: none; font-family: 'Inter', sans-serif;
        }
        .search-results { padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 0.55rem; }
        .search-result-cat {
            font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--warm-brown);
            padding: 0.5rem 0 0.2rem;
        }

        /* Pulse animation for new content */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .menu-item { animation: fadeUp 0.3s ease backwards; }
    </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
    <div class="spinner"></div>
    <p class="loading-text">Loading menu…</p>
</div>

<!-- App Header -->
<header class="app-header">
    <div class="header-top">
        <h1 class="logo">Coffee<span>Way</span></h1>
        <span class="item-total-badge" id="total-badge">— items</span>
    </div>
    <div class="cat-tabs" id="cat-tabs"></div>
</header>

<!-- Search bar (on main page) -->
<div class="search-wrap" id="main-search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="Search menu…" id="inline-search" readonly onclick="openSearch()">
</div>

<!-- Main Menu -->
<main class="main" id="main-menu"></main>
<div id="error-msg"><h3>⚠️ Could not load menu</h3><p style="margin-top:0.5rem">Pull down to refresh or check your connection.</p></div>

<!-- Search Page -->
<div id="search-page">
    <div class="search-page-header">
        <input class="search-page-input" id="search-input" type="text" placeholder="Search items…" autofocus>
        <button class="search-cancel" onclick="closeSearch()">Cancel</button>
    </div>
    <div class="search-results" id="search-results"></div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <button class="nav-btn active" id="nav-menu" onclick="showTab('menu')">
        <span class="nav-btn-icon">🍽️</span>
        <span class="nav-btn-label">Menu</span>
    </button>
    <button class="nav-btn" id="nav-search" onclick="openSearch()">
        <span class="nav-btn-icon">🔍</span>
        <span class="nav-btn-label">Search</span>
    </button>
</nav>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRoEVzA9P0RNVRNZZTOiYc0zMKfMautcCkkVePr1O9W6v2UFecKu37n2dZYQv__eGMk1hl-hk1hW-Qw/pub?gid=0&single=true&output=csv';

const CAT_META = {
    'hot beverages':  { label: 'Hot Beverages',         emoji: '☕' },
    'cold beverages': { label: 'Cold Beverages',        emoji: '🧃' },
    'alcohol':        { label: 'Alcohol',               emoji: '🍺' },
    'chocolate':      { label: 'Chocolate & Sweets',    emoji: '🍫' },
    'chips':          { label: 'Chips',                 emoji: '🥔' },
    'nuts & seeds':   { label: 'Nuts & Seeds',          emoji: '🥜' },
    'croissant':      { label: 'Croissants',            emoji: '🥐' },
    'cake':           { label: 'Cakes',                 emoji: '🎂' },
    'rimas':          { label: 'Rimas Sweets',          emoji: '🍬' },
    'wafer':          { label: 'Wafers',                emoji: '🍪' },
    'batton sale':    { label: 'Salty Snacks',          emoji: '🧂' },
    'al raiif':       { label: 'Al Raiif',              emoji: '🌻' },
};
const CAT_ORDER = ['hot beverages','cold beverages','alcohol','chocolate','chips','nuts & seeds','croissant','cake','rimas','wafer','batton sale','al raiif'];
const SUB_LABELS = {
    'beer':'Beer','shots':'Shots','small drinks':'Small Bottles','wine':'Wine',
    'rum':'Rum','whiskey':'Whiskey','vodka':'Vodka','irish cream':'Irish Cream',
    'gin':'Gin','prosecco':'Prosecco','liquor':'Liqueur','tequila':'Tequila',
    'ice coffe':'Iced Coffee','energy':'Energy Drinks','milk shake':'Milkshakes',
    'iced tea':'Iced Tea','sparkling water':'Sparkling Water',
};
const PREVIEW = 5;

let ALL_DATA = {};   // { catKey: { subKey: [ items ] } }
let ALL_ITEMS = [];  // flat list for search

// ── CSV PARSER ───────────────────────────────────────────────────────────────
function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g,'_').replace(/^_+|_+$/g,''));
    return lines.slice(1).map(line => {
        const cols = []; let cur = '', inQ = false;
        for (const ch of line) {
            if (ch === '"') inQ = !inQ;
            else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
            else cur += ch;
        }
        cols.push(cur.trim());
        const obj = {};
        headers.forEach((h, i) => obj[h] = (cols[i] || '').trim());
        return obj;
    }).filter(r => r.name && r.name.trim());
}

function groupData(rows) {
    const cats = {};
    rows.forEach(r => {
        const cat = (r.category || '').toLowerCase().trim() || 'other';
        const sub = (r.subcategory || '').toLowerCase().trim();
        if (!cats[cat]) cats[cat] = {};
        if (!cats[cat][sub]) cats[cat][sub] = [];
        const item = {
            name: toTitle(r.name || ''),
            description: r.description || '',
            price: r.price || '',
            available: (r.available || 'TRUE').toUpperCase() !== 'FALSE',
            cat, sub
        };
        cats[cat][sub].push(item);
        ALL_ITEMS.push(item);
    });
    return cats;
}

function toTitle(s) {
    return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}
function slugify(s) {
    return s.replace(/\s+/g,'-').replace(/[^a-z0-9\-]/gi,'').toLowerCase();
}

// ── RENDER ITEM ──────────────────────────────────────────────────────────────
function itemHTML(item, delay = 0) {
    const desc = item.description ? `<div class="item-desc">${item.description}</div>` : '';
    const unavail = item.available ? '' : ' unavailable';
    const price = item.price ? `<span class="item-price-tag">${item.price} LL</span>` : '';
    return `
        <div class="menu-item${unavail}" style="animation-delay:${delay}ms">
            <div class="item-info">
                <div class="item-name">${item.name}</div>
                ${desc}
            </div>
            ${price}
        </div>`;
}

// ── BUILD MENU ───────────────────────────────────────────────────────────────
function buildMenu(cats) {
    const ordered = [...CAT_ORDER.filter(k => cats[k]), ...Object.keys(cats).filter(k => !CAT_ORDER.includes(k))];
    const mainEl = document.getElementById('main-menu');
    const tabsEl = document.getElementById('cat-tabs');
    mainEl.innerHTML = '';
    tabsEl.innerHTML = '';

    let totalItems = 0;

    ordered.forEach((catKey, ci) => {
        if (!cats[catKey]) return;
        const meta = CAT_META[catKey] || { label: toTitle(catKey), emoji: '📦' };
        const sl = slugify(catKey);
        const allSubs = cats[catKey];
        const subKeys = Object.keys(allSubs).filter(k => k);
        const hasRealSubs = subKeys.length > 1;
        const flatItems = Object.values(allSubs).flat();
        totalItems += flatItems.length;

        // Nav tab
        tabsEl.innerHTML += `<button class="cat-tab${ci===0?' active':''}" id="tab-${sl}" onclick="scrollToSection('${sl}')">${meta.emoji} ${meta.label}</button>`;

        // Section
        let subPillsHTML = '';
        let subPanelsHTML = '';

        if (hasRealSubs) {
            subPillsHTML = `<div class="sub-pills" id="pills-${sl}">
                ${subKeys.map((sk, i) => {
                    const label = SUB_LABELS[sk] || toTitle(sk);
                    return `<button class="sub-pill${i===0?' active':''}" onclick="switchPill('${sl}','${slugify(sl+'-'+sk)}')">${label}</button>`;
                }).join('')}
            </div>`;

            subPanelsHTML = subKeys.map((sk, si) => {
                const items = allSubs[sk];
                const preview = items.slice(0, PREVIEW);
                const rest = items.slice(PREVIEW);
                const panelSl = slugify(sl+'-'+sk);
                return `
                    <div class="sub-panel${si===0?' active':''}" id="${panelSl}">
                        <div class="items-list" id="list-${panelSl}">
                            ${preview.map((it,i) => itemHTML(it, i*30)).join('')}
                        </div>
                        ${rest.length > 0 ? `
                        <button class="show-more-btn" id="btn-${panelSl}" onclick="toggleMore('${panelSl}', this)">
                            <span>Show ${rest.length} more items</span>
                            <span class="show-more-icon">▼</span>
                        </button>
                        <div id="more-${panelSl}" style="display:none">
                            <div class="items-list">${rest.map((it,i) => itemHTML(it,(i+PREVIEW)*20)).join('')}</div>
                        </div>` : ''}
                    </div>`;
            }).join('');
        } else {
            const items = flatItems;
            const preview = items.slice(0, PREVIEW);
            const rest = items.slice(PREVIEW);
            subPanelsHTML = `
                <div class="sub-panel active" id="${sl}-panel">
                    <div class="items-list">${preview.map((it,i) => itemHTML(it, i*30)).join('')}</div>
                    ${rest.length > 0 ? `
                    <button class="show-more-btn" id="btn-${sl}-panel" onclick="toggleMore('${sl}-panel', this)">
                        <span>Show ${rest.length} more items</span>
                        <span class="show-more-icon">▼</span>
                    </button>
                    <div id="more-${sl}-panel" style="display:none">
                        <div class="items-list">${rest.map((it,i) => itemHTML(it,(i+PREVIEW)*20)).join('')}</div>
                    </div>` : ''}
                </div>`;
        }

        mainEl.innerHTML += `
            <section class="cat-section" id="section-${sl}" data-cat="${sl}">
                <div class="cat-section-header">
                    <div class="cat-section-title">
                        <span class="cat-section-emoji">${meta.emoji}</span>
                        <span class="cat-section-name">${meta.label}</span>
                        <span class="cat-badge">${flatItems.length}</span>
                    </div>
                </div>
                ${subPillsHTML}
                ${subPanelsHTML}
            </section>
            <div class="section-divider"></div>`;
    });

    document.getElementById('total-badge').textContent = `${totalItems} items`;

    // Scroll spy
    setupScrollSpy();
}

// ── INTERACTIONS ─────────────────────────────────────────────────────────────
function scrollToSection(sl) {
    const el = document.getElementById('section-' + sl);
    if (!el) return;
    const offset = document.querySelector('.app-header').offsetHeight
                 + document.getElementById('main-search-wrap').offsetHeight
                 + 8;
    window.scrollTo({ top: el.offsetTop - offset, behavior: 'smooth' });
}

function switchPill(catSl, subSl) {
    const section = document.getElementById('section-' + catSl);
    section.querySelectorAll('.sub-pill').forEach(p => p.classList.remove('active'));
    section.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(subSl).classList.add('active');
}

function toggleMore(id, btn) {
    const moreEl = document.getElementById('more-' + id);
    const isOpen = moreEl.style.display !== 'none';
    moreEl.style.display = isOpen ? 'none' : 'block';
    btn.classList.toggle('open', !isOpen);
    const label = btn.querySelector('span:first-child');
    if (isOpen) {
        const count = moreEl.querySelectorAll('.menu-item').length;
        label.textContent = `Show ${count} more items`;
    } else {
        label.textContent = 'Show less';
    }
}

// ── SCROLL SPY ────────────────────────────────────────────────────────────────
function setupScrollSpy() {
    const headerH = document.querySelector('.app-header').offsetHeight
                  + document.getElementById('main-search-wrap').offsetHeight + 10;
    window.addEventListener('scroll', () => {
        const sections = document.querySelectorAll('.cat-section');
        let current = '';
        sections.forEach(s => {
            if (window.scrollY >= s.offsetTop - headerH - 20) current = s.dataset.cat;
        });
        document.querySelectorAll('.cat-tab').forEach(t => {
            const active = t.id === 'tab-' + current;
            t.classList.toggle('active', active);
            if (active) t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });
    }, { passive: true });
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function openSearch() {
    document.getElementById('search-page').classList.add('show');
    document.getElementById('nav-search').classList.add('active');
    document.getElementById('nav-menu').classList.remove('active');
    setTimeout(() => document.getElementById('search-input').focus(), 100);
}

function closeSearch() {
    document.getElementById('search-page').classList.remove('show');
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').innerHTML = '';
    document.getElementById('nav-menu').classList.add('active');
    document.getElementById('nav-search').classList.remove('active');
}

function showTab(tab) {
    if (tab === 'menu') closeSearch();
}

document.getElementById('search-input').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    const resultsEl = document.getElementById('search-results');
    if (!q) { resultsEl.innerHTML = ''; return; }

    const matched = ALL_ITEMS.filter(it =>
        it.name.toLowerCase().includes(q) || it.description.toLowerCase().includes(q)
    );

    if (!matched.length) {
        resultsEl.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div>No results for "${q}"</div>`;
        return;
    }

    // Group by category
    const grouped = {};
    matched.forEach(it => {
        if (!grouped[it.cat]) grouped[it.cat] = [];
        grouped[it.cat].push(it);
    });

    resultsEl.innerHTML = Object.entries(grouped).map(([cat, items]) => {
        const meta = CAT_META[cat] || { label: toTitle(cat), emoji: '📦' };
        return `
            <div class="search-result-cat">${meta.emoji} ${meta.label}</div>
            ${items.map((it,i) => itemHTML(it, i*20)).join('')}`;
    }).join('');
});

// ── FETCH & INIT ──────────────────────────────────────────────────────────────
async function loadMenu() {
    try {
        const res = await fetch(SHEET_URL);
        if (!res.ok) throw new Error('fetch failed');
        const text = await res.text();
        const rows = parseCSV(text);
        ALL_DATA = groupData(rows);
        buildMenu(ALL_DATA);
        document.getElementById('loading').style.display = 'none';
    } catch (e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
        console.error(e);
    }
}

loadMenu();
</script>
