<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4A3728">
    <title>CoffeeWay Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FAF7F0;
            --warm-brown: #8B6F47;
            --deep-brown: #4A3728;
            --terra: #C17C5A;
            --sage: #9CAF88;
            --coffee: #3E2723;
            --bg: #F5EDE0;
            --card: #FFFFFF;
            --nav-h: 64px;
            --header-h: 72px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--coffee);
            overflow-x: hidden;
            padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
        }

        /* ── LOADING ── */
        #loading {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--cream);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 1rem;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(193,124,90,0.2);
            border-top-color: var(--terra);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-family: 'Playfair Display', serif; color: var(--warm-brown); font-size: 1rem; }

        /* ── HEADER ── */
        .app-header {
            position: sticky; top: 0; z-index: 200;
            background: var(--deep-brown);
            padding: 0 1rem;
            height: var(--header-h);
            display: flex; flex-direction: column;
            justify-content: center;
        }
        .header-top {
            display: flex; align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem; font-weight: 900;
            color: #fff; letter-spacing: 1px;
        }
        .logo span { color: var(--terra); }

        /* ── LOGO IMAGE ── */
        .logo-img-wrap {
            width: 64px; height: 64px;
            flex-shrink: 0;
        }
        .logo-img-preview {
            width: 64px; height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2.5px solid rgba(255,255,255,0.3);
            display: block;
        }
        .item-total-badge {
            background: var(--terra);
            color: #fff; font-size: 0.72rem;
            padding: 0.25rem 0.7rem;
            border-radius: 20px; font-weight: 600;
        }

        /* ── HAMBURGER BUTTON ── */
        .hamburger-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            width: 40px; height: 40px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 5px;
            cursor: pointer; flex-shrink: 0;
        }
        .hamburger-btn span {
            display: block; width: 20px; height: 2px;
            background: #fff; border-radius: 2px;
            transition: all 0.3s;
        }

        /* ── SIDEBAR OVERLAY ── */
        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 400;
        }
        .sidebar-overlay.open { display: block; }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed; top: 0; left: 0;
            width: 72vw; max-width: 280px;
            height: 100%;
            background: var(--deep-brown);
            z-index: 500;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex; flex-direction: column;
            overflow-y: auto;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .sidebar.open { transform: translateX(0); }

        .sidebar-header {
            padding: 1.2rem 1rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-title {
            font-family: 'Playfair Display', serif;
            color: #fff; font-size: 1.1rem; font-weight: 700;
        }
        .sidebar-close {
            background: rgba(255,255,255,0.1);
            border: none; border-radius: 8px;
            width: 32px; height: 32px;
            color: #fff; font-size: 1.1rem;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
        }

        .sidebar-cats { padding: 0.75rem 0; flex: 1; }
        .sidebar-cat-btn {
            display: flex; align-items: center; gap: 0.75rem;
            width: 100%; padding: 0.85rem 1.2rem;
            background: none; border: none;
            color: rgba(255,255,255,0.8);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem; font-weight: 500;
            cursor: pointer; text-align: left;
            transition: background 0.15s, color 0.15s;
        }
        .sidebar-cat-btn:active { background: rgba(255,255,255,0.08); }
        .sidebar-cat-btn.active {
            background: rgba(193,124,90,0.2);
            color: var(--terra);
        }
        .sidebar-cat-emoji { font-size: 1.2rem; }

        /* ── MAIN CONTENT ── */
        .main { padding: 0 0 1rem; }

        /* ── CATEGORY SECTION ── */
        .cat-section { margin-bottom: 0.5rem; }

        .cat-section-header {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 1rem 1rem 0.6rem;
            position: sticky;
            top: var(--header-h);
            z-index: 100;
            background: var(--bg);
        }
        .cat-section-title {
            display: flex; align-items: center; gap: 0.5rem;
        }
        .cat-section-emoji { font-size: 1.3rem; }
        .cat-section-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem; font-weight: 700;
            color: var(--deep-brown);
        }
        .cat-badge {
            background: rgba(193,124,90,0.15);
            color: var(--terra); font-size: 0.72rem;
            padding: 0.2rem 0.55rem; border-radius: 10px;
            font-weight: 600;
        }

        /* ── SUB-CATEGORY PILLS ── */
        .sub-pills {
            display: flex; gap: 0.4rem;
            overflow-x: auto; scrollbar-width: none;
            padding: 0 1rem 0.75rem;
        }
        .sub-pills::-webkit-scrollbar { display: none; }
        .sub-pill {
            background: #fff;
            color: var(--warm-brown);
            border: 1px solid rgba(139,111,71,0.2);
            border-radius: 20px; padding: 0.35rem 0.85rem;
            font-size: 0.78rem; font-weight: 500;
            white-space: nowrap; cursor: pointer;
            transition: all 0.2s; flex-shrink: 0;
        }
        .sub-pill.active {
            background: var(--deep-brown);
            color: #fff; border-color: var(--deep-brown);
        }

        /* ── ITEM CARDS ── */
        .items-list { padding: 0 1rem; display: flex; flex-direction: column; gap: 0.55rem; }

        .menu-item {
            background: var(--card);
            border-radius: 14px;
            padding: 0.9rem 1rem;
            display: flex; align-items: center;
            justify-content: space-between; gap: 0.8rem;
            box-shadow: 0 1px 6px rgba(62,39,35,0.07);
            border: 1px solid rgba(193,124,90,0.08);
            transition: transform 0.15s, box-shadow 0.15s;
            cursor: default;
        }
        .menu-item:active { transform: scale(0.98); box-shadow: 0 1px 3px rgba(62,39,35,0.05); }
        .menu-item.unavailable { opacity: 0.4; }

        .item-info { flex: 1; min-width: 0; }
        .item-name {
            font-size: 0.95rem; font-weight: 600;
            color: var(--deep-brown);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-desc {
            font-size: 0.78rem; color: var(--warm-brown);
            margin-top: 0.2rem; line-height: 1.35;
        }
        .item-price-tag {
            background: var(--terra);
            color: #fff; font-size: 0.82rem; font-weight: 600;
            padding: 0.3rem 0.7rem; border-radius: 20px;
            white-space: nowrap; flex-shrink: 0;
        }

        /* Show more button */
        .show-more-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            margin: 0.75rem 1rem 0.25rem;
            background: #fff; border: 1.5px dashed rgba(193,124,90,0.35);
            color: var(--terra); border-radius: 12px;
            padding: 0.7rem; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .show-more-btn:active { background: rgba(193,124,90,0.08); }
        .show-more-icon { font-size: 0.75rem; transition: transform 0.3s; }
        .show-more-btn.open .show-more-icon { transform: rotate(180deg); }

        /* section divider */
        .section-divider {
            height: 1px;
            background: rgba(139,111,71,0.12);
            margin: 0.5rem 1rem;
        }

        /* ── NO RESULTS ── */
        .no-results {
            text-align: center; padding: 3rem 1rem;
            color: var(--warm-brown); font-style: italic;
        }
        .no-results-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        /* ── ERROR ── */
        #error-msg {
            display: none;
            margin: 2rem 1rem;
            background: #fff3f0; border: 1px solid #f5c6bc;
            border-radius: 14px; padding: 1.5rem; text-align: center;
            color: #c0392b;
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + env(safe-area-inset-bottom));
            background: var(--deep-brown);
            display: flex; align-items: flex-start; justify-content: space-around;
            padding-top: 0.5rem;
            z-index: 300;
            box-shadow: 0 -2px 16px rgba(62,39,35,0.25);
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.2rem; padding: 0.3rem 0.8rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer; transition: color 0.2s;
            border: none; background: none;
            font-family: 'Inter', sans-serif;
        }
        .nav-btn.active { color: var(--terra); }
        .nav-btn-icon { font-size: 1.3rem; }
        .nav-btn-label { font-size: 0.65rem; font-weight: 500; }

        /* ── SEARCH PAGE ── */
        #search-page {
            display: none;
            position: fixed; inset: 0;
            background: var(--bg);
            z-index: 250;
            overflow-y: auto;
            padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
        }
        #search-page.show { display: block; }
        .search-page-header {
            background: var(--deep-brown);
            padding: 1rem 1rem 0.8rem;
            display: flex; align-items: center; gap: 0.75rem;
            position: sticky; top: 0; z-index: 10;
        }
        .search-page-input {
            flex: 1; padding: 0.65rem 1rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px; color: #fff;
            font-size: 0.95rem; font-family: 'Inter', sans-serif;
            outline: none;
        }
        .search-page-input::placeholder { color: rgba(255,255,255,0.5); }
        .search-cancel {
            color: var(--terra); font-size: 0.88rem;
            font-weight: 600; cursor: pointer; white-space: nowrap;
            background: none; border: none; font-family: 'Inter', sans-serif;
        }
        .search-results { padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 0.55rem; }
        .search-result-cat {
            font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--warm-brown);
            padding: 0.5rem 0 0.2rem;
        }

        /* ── SUBCATEGORY BLOCK HEADER ── */
        .sub-block { margin-bottom: 0.25rem; }
        .sub-block-header {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.9rem 1rem 0.5rem;
            border-left: 3px solid var(--terra);
            margin: 0.5rem 1rem 0.4rem;
            border-radius: 0 4px 4px 0;
        }
        .sub-block-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem; font-weight: 700;
            color: var(--deep-brown);
            flex: 1;
        }

        /* ── SUBCATEGORY ACTIVE LABEL ── */
        .sub-active-label {
            display: flex; align-items: center; gap: 0.4rem;
            margin: 0 1rem 0.6rem;
            padding: 0.45rem 0.9rem;
            background: rgba(193,124,90,0.12);
            border-left: 3px solid var(--terra);
            border-radius: 0 8px 8px 0;
            font-size: 0.8rem; font-weight: 600;
            color: var(--terra);
            letter-spacing: 0.2px;
        }
        .sub-active-label-prefix {
            color: var(--warm-brown); font-weight: 400; font-size: 0.75rem;
        }

        /* Pulse animation for new content */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .menu-item { animation: fadeUp 0.3s ease backwards; }
    </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
    <div class="spinner"></div>
    <p class="loading-text">Loading menu…</p>
</div>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span class="sidebar-title">Categories</span>
        <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <div class="sidebar-cats" id="sidebar-cats"></div>
</div>

<!-- App Header -->
<header class="app-header">
    <div class="header-top">
        <div style="display:flex;align-items:center;gap:0.75rem;">
            <button class="hamburger-btn" onclick="openSidebar()" aria-label="Categories">
                <span></span><span></span><span></span>
            </button>
            <div class="logo-img-wrap has-logo" id="logo-img-wrap">
                <img class="logo-img-preview" id="logo-preview" src="logo.jpeg" alt="Logo">
            </div>
            <h1 class="logo">Coffee<span>Way</span></h1>
        </div>
        <span class="item-total-badge" id="total-badge">— items</span>
    </div>
</header>

<!-- Main Menu -->
<main class="main" id="main-menu"></main>
<div id="error-msg"><h3>⚠️ Could not load menu</h3><p style="margin-top:0.5rem">Pull down to refresh or check your connection.</p></div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <button class="nav-btn active" id="nav-menu">
        <span class="nav-btn-icon">🍽️</span>
        <span class="nav-btn-label">Menu</span>
    </button>
</nav>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz4kzdQfZgkzYIvVwM8C34Au8cQ_mK5EW1DwMYunuYh2QTDOqFNOs2RaR7QtmeIsNXpCg/exec';

const CAT_META = {
    'hot beverages':  { label: 'Hot Beverages',         emoji: '☕' },
    'cold beverages': { label: 'Cold Beverages',        emoji: '🧃' },
    'alcohol':        { label: 'Alcohol',               emoji: '🍺' },
    'chocolate':      { label: 'Chocolate & Sweets',    emoji: '🍫' },
    'chips':          { label: 'Chips',                 emoji: '🥔' },
    'nuts & seeds':   { label: 'Nuts & Seeds',          emoji: '🥜' },
    'croissant':      { label: 'Croissants',            emoji: '🥐' },
    'cake':           { label: 'Cakes',                 emoji: '🎂' },
    'rimas':          { label: 'Rimas Sweets',          emoji: '🍬' },
    'wafer':          { label: 'Wafers',                emoji: '🍪' },
    'batton sale':    { label: 'Salty Snacks',          emoji: '🧂' },
    'al raiif':       { label: 'Al Raiif',              emoji: '🌻' },
    'caaket':          { label: 'Caaket',                  emoji: '🥮' },
};
const CAT_ORDER = ['hot beverages','cold beverages','alcohol','chocolate','chips','nuts & seeds','croissant','cake','rimas','wafer','batton sale','al raiif','caake'];
const SUB_LABELS = {
    'beer':'Beer','shots':'Shots','small drinks':'Small Bottles','wine':'Wine',
    'rum':'Rum','whiskey':'Whiskey','vodka':'Vodka','irish cream':'Irish Cream',
    'gin':'Gin','prosecco':'Prosecco','liquor':'Liqueur','tequila':'Tequila',
    'ice coffe':'Iced Coffee','energy':'Energy Drinks','milk shake':'Milkshakes',
    'iced tea':'Iced Tea','sparkling water':'Sparkling Water',
};
const PREVIEW = 5;

let ALL_DATA = {};   // { catKey: { subKey: [ items ] } }
let ALL_ITEMS = [];  // flat list for search

// ── CSV PARSER ───────────────────────────────────────────────────────────────
function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g,'_').replace(/^_+|_+$/g,''));
    return lines.slice(1).map(line => {
        const cols = []; let cur = '', inQ = false;
        for (const ch of line) {
            if (ch === '"') inQ = !inQ;
            else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
            else cur += ch;
        }
        cols.push(cur.trim());
        const obj = {};
        headers.forEach((h, i) => obj[h] = (cols[i] || '').trim());
        return obj;
    }).filter(r => r.name && r.name.trim());
}

function groupData(rows) {
    const cats = {};
    rows.forEach(r => {
        const cat = (r.category || '').toLowerCase().trim() || 'other';
        const sub = (r.subcategory || '').toLowerCase().trim();
        if (!cats[cat]) cats[cat] = {};
        if (!cats[cat][sub]) cats[cat][sub] = [];
        const item = {
            name: toTitle(r.name || ''),
            description: r.description || '',
            price: r.price || '',
            available: (r.available || 'TRUE').toUpperCase() !== 'FALSE',
            cat, sub
        };
        cats[cat][sub].push(item);
        ALL_ITEMS.push(item);
    });
    return cats;
}

function toTitle(s) {
    return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}
function slugify(s) {
    return s.replace(/\s+/g,'-').replace(/[^a-z0-9\-]/gi,'').toLowerCase();
}

// ── RENDER ITEM ──────────────────────────────────────────────────────────────
function itemHTML(item, delay = 0) {
    const desc = item.description ? `<div class="item-desc">${item.description}</div>` : '';
    const unavail = item.available ? '' : ' unavailable';
    const price = item.price ? `<span class="item-price-tag">${(parseFloat(item.price) * 1000).toLocaleString()} LL</span>` : '';
    return `
        <div class="menu-item${unavail}" style="animation-delay:${delay}ms">
            <div class="item-info">
                <div class="item-name">${item.name}</div>
                ${desc}
            </div>
            ${price}
        </div>`;
}

// ── BUILD MENU ───────────────────────────────────────────────────────────────
function buildMenu(cats) {
    const ordered = [...CAT_ORDER.filter(k => cats[k]), ...Object.keys(cats).filter(k => !CAT_ORDER.includes(k))];
    const mainEl = document.getElementById('main-menu');
    const sidebarCats = document.getElementById('sidebar-cats');
    mainEl.innerHTML = '';
    sidebarCats.innerHTML = '';

    let totalItems = 0;

    ordered.forEach((catKey, ci) => {
        if (!cats[catKey]) return;
        const meta = CAT_META[catKey] || { label: toTitle(catKey), emoji: '📦' };
        const sl = slugify(catKey);
        const allSubs = cats[catKey];
        const subKeys = Object.keys(allSubs).filter(k => k);
        const hasRealSubs = subKeys.length > 1;
        const flatItems = Object.values(allSubs).flat();
        totalItems += flatItems.length;

        // Sidebar button
        sidebarCats.innerHTML += `<button class="sidebar-cat-btn${ci===0?' active':''}" id="sidebarbtn-${sl}" onclick="sidebarNav('${sl}')">\
<span class="sidebar-cat-emoji">${meta.emoji}</span>${meta.label}</button>`;

        // Section
        let subPillsHTML = '';
        let subPanelsHTML = '';

        if (hasRealSubs) {
            subPillsHTML = `<div class="sub-pills" id="pills-${sl}">
                ${subKeys.map((sk, i) => {
                    const label = SUB_LABELS[sk] || toTitle(sk);
                    return `<button class="sub-pill${i===0?' active':''}" onclick="scrollToSub('${slugify(sl+'-'+sk)}', this, '${sl}')">${label}</button>`;
                }).join('')}
            </div>`;

            subPanelsHTML = subKeys.map((sk, si) => {
                const items = allSubs[sk];
                const label = SUB_LABELS[sk] || toTitle(sk);
                const preview = items.slice(0, PREVIEW);
                const rest = items.slice(PREVIEW);
                const panelSl = slugify(sl+'-'+sk);
                return `
                    <div class="sub-block" id="${panelSl}" data-cat="${sl}">
                        <div class="sub-block-header">
                            <span class="sub-block-title">${label}</span>
                            <span class="cat-badge">${items.length}</span>
                        </div>
                        <div class="items-list">
                            ${preview.map((it,i) => itemHTML(it, i*30)).join('')}
                        </div>
                        ${rest.length > 0 ? `
                        <button class="show-more-btn" id="btn-${panelSl}" onclick="toggleMore('${panelSl}', this)">
                            <span>Show ${rest.length} more items</span>
                            <span class="show-more-icon">▼</span>
                        </button>
                        <div id="more-${panelSl}" style="display:none">
                            <div class="items-list">${rest.map((it,i) => itemHTML(it,(i+PREVIEW)*20)).join('')}</div>
                        </div>` : ''}
                    </div>`;
            }).join('');
        } else {
            const items = flatItems;
            const preview = items.slice(0, PREVIEW);
            const rest = items.slice(PREVIEW);
            subPanelsHTML = `
                <div class="sub-panel active" id="${sl}-panel">
                    <div class="items-list">${preview.map((it,i) => itemHTML(it, i*30)).join('')}</div>
                    ${rest.length > 0 ? `
                    <button class="show-more-btn" id="btn-${sl}-panel" onclick="toggleMore('${sl}-panel', this)">
                        <span>Show ${rest.length} more items</span>
                        <span class="show-more-icon">▼</span>
                    </button>
                    <div id="more-${sl}-panel" style="display:none">
                        <div class="items-list">${rest.map((it,i) => itemHTML(it,(i+PREVIEW)*20)).join('')}</div>
                    </div>` : ''}
                </div>`;
        }

        mainEl.innerHTML += `
            <section class="cat-section" id="section-${sl}" data-cat="${sl}">
                <div class="cat-section-header">
                    <div class="cat-section-title">
                        <span class="cat-section-emoji">${meta.emoji}</span>
                        <span class="cat-section-name">${meta.label}</span>
                        <span class="cat-badge">${flatItems.length}</span>
                    </div>
                </div>
                ${subPillsHTML}
                ${subPanelsHTML}
            </section>
            <div class="section-divider"></div>`;
    });

    document.getElementById('total-badge').textContent = `${totalItems} items`;

    // Scroll spy
    setupScrollSpy();
}

// ── INTERACTIONS ─────────────────────────────────────────────────────────────
function scrollToSection(sl) {
    const el = document.getElementById('section-' + sl);
    if (!el) return;
    const offset = document.querySelector('.app-header').offsetHeight + 8;
    window.scrollTo({ top: el.offsetTop - offset, behavior: 'smooth' });
}

function sidebarNav(sl) {
    closeSidebar();
    setTimeout(() => scrollToSection(sl), 320);
}

function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
    document.body.style.overflow = '';
}

function scrollToSub(subSl, btn, catSl) {
    // Update active pill
    const section = document.getElementById('section-' + catSl);
    section.querySelectorAll('.sub-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');

    // Scroll to the sub-block
    const block = document.getElementById(subSl);
    if (!block) return;
    const offset = document.querySelector('.app-header').offsetHeight + 8;
    const top = block.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top, behavior: 'smooth' });
}

function toggleMore(id, btn) {
    const moreEl = document.getElementById('more-' + id);
    const isOpen = moreEl.style.display !== 'none';
    moreEl.style.display = isOpen ? 'none' : 'block';
    btn.classList.toggle('open', !isOpen);
    const label = btn.querySelector('span:first-child');
    if (isOpen) {
        const count = moreEl.querySelectorAll('.menu-item').length;
        label.textContent = `Show ${count} more items`;
    } else {
        label.textContent = 'Show less';
    }
}

// ── SCROLL SPY ────────────────────────────────────────────────────────────────
function setupScrollSpy() {
    const headerH = document.querySelector('.app-header').offsetHeight + 10;
    window.addEventListener('scroll', () => {
        const sections = document.querySelectorAll('.cat-section');
        let current = '';
        sections.forEach(s => {
            if (window.scrollY >= s.offsetTop - headerH - 20) current = s.dataset.cat;
        });
        document.querySelectorAll('.sidebar-cat-btn').forEach(t => {
            const sl = t.id.replace('sidebarbtn-', '');
            t.classList.toggle('active', sl === current);
        });
    }, { passive: true });
}

// ── FETCH & INIT ──────────────────────────────────────────────────────────────
async function loadMenu() {
    try {
        const res = await fetch('menu.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = await res.json();
        const normalized = rows.map(row => {
            const obj = {};
            Object.keys(row).forEach(k => {
                const nk = k.toLowerCase().trim().replace(/\s+/g,'_');
                obj[nk] = String(row[k]).trim();
            });
            return obj;
        }).filter(r => r.name && r.name.trim());
        ALL_DATA = groupData(normalized);
        buildMenu(ALL_DATA);
        document.getElementById('loading').style.display = 'none';
    } catch (e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').innerHTML = `<h3>⚠️ Could not load menu</h3><p style="margin-top:0.5rem;font-size:0.8rem">${e.message}</p>`;
        document.getElementById('error-msg').style.display = 'block';
        console.error(e);
    }
}

loadMenu();
</script>
